<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
    <title>60 Second Countdown Timer</title>
</head>
<body>
    <div class="align"><h1>Pomodoro Countdown</h1></div>

    <div class="align">
    <p id="work_text">WORK</p>
    <p id="break_text">BREAK</p>
    </div>

    <div class="center">
    <h1 id="timer">1</h1>
    <h1 id="rest_timer">1</h1>
    </div>

    <div class="button-align">
    <button id="start_button">START</button>
    <button id="pause_button">PAUSE</button>
    <button id="reset_button">RESET</button>
    </div>

    <script src="timer.js"></script>
</body>
</html>
